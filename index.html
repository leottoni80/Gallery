<div id="video-modal" class="video-modal">
  <div class="video-modal-content">
    <span class="video-close">&times;</span>
    <iframe id="video-frame" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>
</div>

<script>
  window.addEventListener("load", () => {
    document.body.classList.add("ready");
  });
// Select all carousels
  document.querySelectorAll('.v-carousel').forEach(carousel => {
    const track = carousel.querySelector('.v-track');
    const cardHeight = track.querySelector('.v-card').offsetHeight + 18; // card + gap

    // Up arrow
    const up = carousel.querySelector('.v-arrow--up');
    up.addEventListener('click', () => {
      track.scrollBy({ top: -cardHeight, behavior: 'smooth' });
    });

    // Down arrow
    const down = carousel.querySelector('.v-arrow--down');
    down.addEventListener('click', () => {
      track.scrollBy({ top: cardHeight, behavior: 'smooth' });
    });
  });
</script>

<script>
// MODAL LOGIC WITH TIMESTAMP SUPPORT
const modal = document.getElementById('video-modal');
const iframe = document.getElementById('video-frame');
const closeBtn = document.querySelector('.video-close');

document.querySelectorAll('.v-card').forEach(card => {
  card.addEventListener('click', () => {

    let url = card.getAttribute('data-video');

    // Extract video ID (works for both youtu.be and watch?v=)
    const idMatch = url.match(/(?:v=|youtu\.be\/)([^&?]+)/);
    const videoId = idMatch ? idMatch[1] : null;

    if (!videoId) return;

    // Extract timestamp (t=123)
    const tMatch = url.match(/t=(\d+)/);
    const startTime = tMatch ? tMatch[1] : null;

    // Build clean embed URL
    let embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1`;

    // Add start time if present
    if (startTime) {
      embedUrl += `&start=${startTime}`;
    }

    iframe.src = embedUrl;
    modal.classList.add('open');
  });
});

closeBtn.addEventListener('click', () => {
  modal.classList.remove('open');
  iframe.src = "";
});

modal.addEventListener('click', e => {
  if (e.target === modal) {
    modal.classList.remove('open');
    iframe.src = "";
  }
});

document.addEventListener('keydown', e => {
  if (e.key === "Escape") {
    modal.classList.remove('open');
    iframe.src = "";
  }
});
</script>


</body>
</html>
